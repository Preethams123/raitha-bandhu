<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Raitha Bandhu-profile</title>

<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="mobile.css">

<style>

/* RESET */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  background: #f8fafc;
  font-family: system-ui, sans-serif;
}

/* LAYOUT */
.profile-container {
  max-width: 1200px;
  margin: 40px auto;
  display: grid;
  grid-template-columns: minmax(260px, 320px) 1fr;
  gap: 32px;
  padding: 0 24px;
}

/* SIDEBAR */
.profile-sidebar {
  position: sticky;
  top: 100px;
}

.user-card {
  background: #fff;
  padding: 28px;
  border-radius: 20px;
  border: 1px solid #e5e7eb;
  text-align: center;
}

/* MAIN CARD */
.main-card {
  background: #fff;
  padding: 28px;
  border-radius: 20px;
  border: 1px solid #e5e7eb;
}

/* FORM */
.form-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
}

.input-wrap {
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.p-input {
  background: #f8fafc;
  border: 2px solid #e2e8f0;
  padding: 13px;
  border-radius: 12px;
}

/* 🔥 BUTTON FIX (FINAL) */
button.btn-save-up {
  all: unset;

  grid-column: 1 / -1;

  display: flex;
  align-items: center;
  justify-content: center;

  width: 100%;
  padding: 15px;

  border-radius: 14px;
  font-size: 15px;
  font-weight: 800;

  background: linear-gradient(135deg, #10b981, #059669);
  color: #fff;

  cursor: pointer;
  transition: all 0.2s ease;
}

button.btn-save-up:hover {
  transform: translateY(-1px);
  box-shadow: 0 8px 18px rgba(16,185,129,0.25);
}

button.btn-save-up:active {
  transform: scale(0.97);
}

button.btn-save-up:disabled {
  opacity: 0.6;
}

/* RESPONSIVE */
@media (max-width: 900px) {
  .profile-container {
    grid-template-columns: 1fr;
  }
  .form-grid {
    grid-template-columns: 1fr;
  }
}

</style>
</head>

<body>

<main class="profile-container">

  <aside class="profile-sidebar">
    <div class="user-card">
      <h2>Farmer Name</h2>
      <p>RB-0000-0000</p>
    </div>
  </aside>

  <div class="profile-main">
    <div class="main-card">

      <h3>Update Farm Profile</h3>

      <form class="form-grid">

        <div class="input-wrap">
          <label>Name</label>
          <input type="text" class="p-input">
        </div>

        <div class="input-wrap">
          <label>Phone</label>
          <input type="text" class="p-input">
        </div>

        <div class="input-wrap">
          <label>District</label>
          <select class="p-input"></select>
        </div>

        <div class="input-wrap">
          <label>Taluk</label>
          <select class="p-input"></select>
        </div>

        <div class="input-wrap">
          <label>Mandi</label>
          <select class="p-input"></select>
        </div>

        <div class="input-wrap">
          <label>Crop</label>
          <select class="p-input"></select>
        </div>

        <div class="input-wrap">
          <label>Soil</label>
          <select class="p-input"></select>
        </div>

        <div class="input-wrap">
          <label>Water</label>
          <select class="p-input"></select>
        </div>

        <!-- ✅ FIXED BUTTON -->
        <button type="submit" class="btn-save-up">
          Update Farm Profile
        </button>

      </form>

    </div>
  </div>

</main>

</body>
</html>
